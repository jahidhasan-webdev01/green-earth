<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind CSS and Daisy UI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Green Earth</title>
    <link rel="shortcut icon" href="./assets/hero-leaf1.png" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-green-50">
    <header class="bg-success">
        <nav class="w-full md:w-10/12 mx-auto">
            <div class="navbar">
                <div class="navbar-start">
                    <div class="dropdown">
                        <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16M4 12h8m-8 6h16" />
                            </svg>
                        </div>
                        <ul tabindex="-1"
                            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                            <li><a class="text-green-600 font-semibold">About</a></li>
                            <li><a class="text-green-600 font-semibold">Gallery</a></li>
                            <li><a class="text-green-600 font-semibold">Plant a Tree</a></li>
                        </ul>
                    </div>
                    <a class="text-xl text-white font-bold cursor-pointer">Green Earth</a>
                </div>
                <div class="navbar-center hidden lg:flex">
                    <ul class="menu menu-horizontal px-1">
                        <li><a class="text-white font-semibold">About</a></li>
                        <li><a class="text-white font-semibold">Gallery</a></li>
                        <li><a class="text-white font-semibold">Plant a Tree</a></li>
                    </ul>
                </div>
                <div class="navbar-end gap-5">
                    <a class="btn btn-sm btn-warning text-green-600 font-bold rounded-4xl">Plant a Tree</a>
                    <button class="xl:hidden btn btn-sm btn-neautral rounded-4xl">
                        <span class="text-black font-bold">cart</span>
                        <div class="badge badge-sm badge-neautral">00</div>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <section class="w-full px-2 md:px-0 lg:w-10/12 mx-auto pb-5">
        <h1 class="text-center py-5 lg:py-10 font-bold text-xl">Choose Your Trees</h1>
        <div id="category-loading-container" class="flex min-h-[50vh] items-center justify-center hidden">
            <span class="loading loading-spinner loading-xl"></span>
        </div>
        <!-- Sidebar: For small device only -->
        <div class="lg:hidden">
            <div
                class="categories-container flex gap-2 text-sm overflow-x-auto whitespace-nowrap pb-2 px-4 no-scrollbar scroll-smooth">
                <!-- Categories will appear here dynamically -->
            </div>
        </div>

        <div class="grid grid-cols-12 gap-5">
            <!-- sidebar -->
            <div class="lg:col-span-2 sticky top-10 self-start hidden lg:block">
                <h3 class="font-bold">Categories</h3>
                <div class="categories-container mt-3 flex flex-col items-start gap-1 text-sm">
                    <!-- Categories will appear here dynamically -->
                </div>
            </div>

            <!-- cards area -->
            <div class="col-span-12 lg:col-span-10 xl:col-span-8 min-h-screen">
                <div id="plant-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-5">
                </div>
                <div id="card-loading-container" class="flex min-h-[50vh] items-center justify-center hidden">
                    <span class="loading loading-spinner loading-xl"></span>
                </div>
            </div>

            <!-- cart area -->
            <div class="bg-white xl:col-span-2 rounded px-2 py-1 hidden xl:block">
                <div class="flex justify-between">
                    <h3 class="font-bold">Your Cart</h3>
                    <p id="cart-item-count" class="font-bold">0</p>
                </div>
                </h3>
                <div id="cart-items" class="mt-3 space-y-2 border-b border-gray-600 border-dotted pb-4 hidden">
                </div>

                <div id="cart-total" class="flex justify-between mt-2 font-bold text-sm hidden">
                    <h1>Total:</h1>
                    <h1>৳ <span id="total-count">1000</span></h1>
                </div>

                <div id="cart-empty" class="mt-5">
                    <p class="font-bold text-center text-sm text-red-600">Your cart is empty, <br> please add.</p>
                </div>
            </div>
        </div>
    </section>

    <script src="./javascript/script.js"></script>
</body>

</html>
